<!DOCTYPE html>
<html>

<head>
    <title>Apply Leave</title>
</head>

<body>

<h2>Apply Leave</h2>

<form action="/submit_leave" method="POST">

    <label>Leave Type</label>

    <select name="leave_type">

        <option value="CL">
            Casual Leave
        </option>

        <option value="SL">
            Sick Leave
        </option>

        <option value="LWP">
            Leave Without Pay
        </option>

    </select>

    <br><br>

    <label>From Date</label>

    <input
        type="date"
        name="from_date"
        required
    >

    <br><br>

    <label>To Date</label>

    <input
        type="date"
        name="to_date"
        required
    >

    <br><br>

    <label>Reason</label>

    <br>

    <textarea
        name="reason"
        rows="4"
        cols="40"
    ></textarea>

    <br><br>

    <button type="submit">
        Submit Leave Request
    </button>

</form>

<br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
