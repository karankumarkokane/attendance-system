<!DOCTYPE html>
<html>

<head>
    <title>
        Leave Requests
    </title>
</head>

<body>

<h2>
    Leave Requests
</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Employee ID</th>
    <th>Type</th>
    <th>From</th>
    <th>To</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for leave in leaves %}

<tr>

<td>{{ leave.id }}</td>

<td>{{ leave.employee_id }}</td>

<td>{{ leave.leave_type }}</td>

<td>{{ leave.from_date }}</td>

<td>{{ leave.to_date }}</td>

<td>{{ leave.status }}</td>

<td>

{% if leave.status == "Pending" %}

<a href="/approve_leave/{{ leave.id }}">
    Approve
</a>

|

<a href="/reject_leave/{{ leave.id }}">
    Reject
</a>

{% endif %}

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
